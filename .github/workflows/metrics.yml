name: Generate Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate Base Stats
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rakkunn
          config_timezone: Asia/Seoul
          base: header, activity, community, repositories
          config_theme: tokyonight

      - name: Generate Languages Stats
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rakkunn
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 20
          plugin_languages_threshold: 0%
          plugin_languages_indepth: yes
          config_theme: tokyonight

      - name: Generate Isometric Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rakkunn
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_theme: tokyonight
