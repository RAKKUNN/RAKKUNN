# lowlighter/metrics workflow
# Generates SVG metrics cards and commits them to github-metrics/ directory
# 
# ⚠️  SETUP REQUIRED:
#   1. Go to https://github.com/settings/tokens → Generate new token (classic)
#   2. Scopes needed: repo, read:user, read:org (optional)
#   3. Go to your profile repo → Settings → Secrets and variables → Actions
#   4. Create secret named METRICS_TOKEN with the token value
#   5. Push this workflow — it runs daily at 00:00 UTC and on manual trigger

name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"    # daily at midnight UTC
  workflow_dispatch:         # manual trigger
  push:
    branches: [main]

jobs:

  # ── 1. Base overview (commits, PRs, issues, stars) ──
  base:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rakkunn
          base: header, activity, community, repositories
          config_timezone: Asia/Seoul
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_sections: base

  # ── 2. Most used languages ──
  languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rakkunn
          base: ""
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_layout: compact
          plugin_languages_limit: 8
          plugin_languages_threshold: 1%

  # ── 3. Contribution isocalendar ──
  isocalendar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rakkunn
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

  # ── 4. Coding habits (time distribution) ──
  habits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          filename: github-metrics/habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rakkunn
          base: ""
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          config_timezone: Asia/Seoul
